<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel MySQL Backend Viewer</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 2rem; }
        h1 { border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        h2 { color: #00d4ff; margin-top: 30px; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .data-block { background: #111; padding: 15px; border: 1px solid #333; margin-bottom: 10px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; }
        .refresh-btn { background: #00ff00; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .refresh-btn:hover { background: #00cc00; }
        .empty { color: #666; font-style: italic; }
        .status-pill { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-left: 10px; }
        .online { color: #00ff00; border: 1px solid #00ff00; }
        .offline { color: #ff0000; border: 1px solid #ff0000; }
    </style>
</head>
<body>
    <h1>MySQL Database Viewer (Backend)</h1>
    <p>Connected to: MySQL Server | Active Database: hostel_db <span id="status" class="status-pill offline">OFFLINE</span></p>
    <button class="refresh-btn" onclick="fetchAllData()">REFRESH SQL QUERIES</button>
    
    <h2>Table: SELECT * FROM students</h2>
    <div id="students-content">Fetching...</div>

    <h2>Table: SELECT * FROM rooms</h2>
    <div id="rooms-content">Fetching...</div>

    <h2>Table: SELECT * FROM allocations</h2>
    <div id="allocations-content">Fetching...</div>

    <script>
        async function fetchTable(url, elementId) {
            const contentDiv = document.getElementById(elementId);
            const statusPill = document.getElementById('status');
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Database connection error');
                }
                const data = await response.json();
                
                contentDiv.innerHTML = '';
                statusPill.textContent = 'ONLINE';
                statusPill.className = 'status-pill online';
                
                if (data.length === 0) {
                    contentDiv.innerHTML = '<div class="data-block empty">No rows found in table.</div>';
                    return;
                }

                data.forEach((row, index) => {
                    const html = `<div class="data-block">/* Row ${index + 1} */\n${JSON.stringify(row, null, 4)}</div>`;
                    contentDiv.innerHTML += html;
                });
            } catch (err) {
                contentDiv.innerHTML = `<div class="data-block" style="color:#ff5555">Error executing query: ${err.message}</div>`;
                statusPill.textContent = 'ERROR';
                statusPill.className = 'status-pill offline';
            }
        }

        function fetchAllData() {
            document.getElementById('students-content').innerHTML = "Executing SQL...";
            document.getElementById('rooms-content').innerHTML = "Executing SQL...";
            document.getElementById('allocations-content').innerHTML = "Executing SQL...";
            
            fetchTable('/api/students', 'students-content');
            fetchTable('/api/rooms', 'rooms-content');
            fetchTable('/api/allocations', 'allocations-content');
        }
        
        fetchAllData();
    </script>
</body>
</html>
